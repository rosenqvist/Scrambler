name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  format-check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          $cf = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "clang-format.exe" |
                Where-Object { $_.FullName -like '*Llvm\x64*' } |
                Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Using: $cf"
          & $cf --version
          $files = @(git ls-files -- '*.cpp' '*.h' ':!:third_party/**')
          if ($files.Count -gt 0) {
            & $cf --dry-run --Werror --style=file $files
          }

  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DSCRAMBLER_ENABLE_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error
